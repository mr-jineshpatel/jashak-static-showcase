<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found - Jashak</title>
  <meta name="robots" content="noindex, follow">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #101010;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }

    .box {
      max-width: 680px;
    }

    .code {
      font-size: 96px;
      font-weight: 800;
      color: #0d6efd;
      line-height: 1;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 36px;
      line-height: 1.2;
      margin: 0 0 12px;
    }

    p {
      font-size: 17px;
      line-height: 1.7;
      color: #555;
      margin: 0 0 28px;
    }

    a {
      display: inline-block;
      background: #0d6efd;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      padding: 14px 26px;
      border-radius: 4px;
    }

    a:hover,
    a:focus {
      background: #084fc7;
    }

    @media (max-width: 575px) {
      .code {
        font-size: 72px;
      }

      h1 {
        font-size: 28px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="box">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you are looking for does not exist or has been moved.</p>
    <a href="/">Back to Home</a>
  </main>
</body>
</html>
